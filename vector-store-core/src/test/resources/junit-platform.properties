# Shared JUnit 5 platform configuration.
#
# jqwik 1.6+ reads its configuration from this file under the jqwik.*
# namespace. The L2 stress harness's property test runs in the default
# unit suite at 100 tries; the stress-nightly profile (slice C) layers a
# nightly properties file that flips jqwik.tries.default to 1000.
jqwik.tries.default = 100
jqwik.maxdiscardratio.default = 5
jqwik.failures.after.default = SAMPLE_ONLY
jqwik.reporting.usejunitplatform = false
jqwik.reporting.onlyfailures = false
