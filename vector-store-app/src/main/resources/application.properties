# vector-store — Quarkus application configuration.
#
# Profiles:
#   %dev   — local developer mode, OTel exporter disabled, console logging
#   %test  — component-test mode, in-memory SQLite, cheap Argon2 params
#   %prod  — production, OTel OTLP exporter, JSON logging

quarkus.application.name=vector-store
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Index sibling modules so Quarkus discovers @Path resources, @Provider
# mappers, filters, and CDI beans outside the app module.
quarkus.index-dependency.core.group-id=io.github.zznate
quarkus.index-dependency.core.artifact-id=vector-store-core
quarkus.index-dependency.api.group-id=io.github.zznate
quarkus.index-dependency.api.artifact-id=vector-store-api

# --- Datasource -------------------------------------------------------------

# SQLite is single-writer; size the pool accordingly. The foreign_keys pragma
# arrives through the JDBC URL because Quarkus Agroal does not offer a
# first-class setting for SQLite-specific pragmas.
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:${VECTORSTORE_DB_PATH:./vector-store.db}?foreign_keys=on
quarkus.datasource.jdbc.max-size=1

# Component tests use a per-class unique file under target/ (see
# @QuarkusTestResource usage in vector-store-app/src/test).
%test.quarkus.datasource.jdbc.url=jdbc:sqlite:${VECTORSTORE_DB_PATH:target/test-vector-store.db}?foreign_keys=on
%test.quarkus.datasource.jdbc.max-size=1

# --- Flyway -----------------------------------------------------------------

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# --- OpenTelemetry ----------------------------------------------------------

quarkus.otel.resource.attributes=service.name=vector-store,service.version=${quarkus.application.version}

%dev.quarkus.otel.sdk.disabled=true
%test.quarkus.otel.sdk.disabled=true
%prod.quarkus.otel.exporter.otlp.endpoint=http://otel-collector.stepflow-o11y:4317
%prod.quarkus.otel.exporter.otlp.protocol=grpc

# --- Logging ----------------------------------------------------------------

quarkus.log.level=INFO
quarkus.log.category."io.github.zznate.vectorstore".level=INFO

# JSON logging in prod, human-readable in dev/test.
%prod.quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
%test.quarkus.log.console.json=false

# --- OpenAPI / metrics exposure --------------------------------------------

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# --- Argon2id password hashing ---------------------------------------------

vectorstore.auth.argon2.iterations=3
vectorstore.auth.argon2.memory-kib=65536
vectorstore.auth.argon2.parallelism=1

# Cheap Argon2 params for tests — tests validate round-trip behaviour, not
# crypto strength.
%test.vectorstore.auth.argon2.iterations=1
%test.vectorstore.auth.argon2.memory-kib=1024
%test.vectorstore.auth.argon2.parallelism=1
