# vector-store — Quarkus application configuration.
#
# Profiles:
#   %dev   — local developer mode, OTel exporter disabled, console logging
#   %test  — component-test mode, in-memory SQLite, cheap Argon2 params
#   %prod  — production, OTel OTLP exporter, JSON logging

quarkus.application.name=vector-store
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Index sibling modules so Quarkus discovers @Path resources, @Provider
# mappers, filters, and CDI beans outside the app module.
quarkus.index-dependency.core.group-id=io.github.zznate
quarkus.index-dependency.core.artifact-id=vector-store-core
quarkus.index-dependency.api.group-id=io.github.zznate
quarkus.index-dependency.api.artifact-id=vector-store-api
quarkus.index-dependency.engine.group-id=io.github.zznate
quarkus.index-dependency.engine.artifact-id=vector-store-engine
quarkus.index-dependency.storage.group-id=io.github.zznate
quarkus.index-dependency.storage.artifact-id=vector-store-storage
quarkus.index-dependency.metadata.group-id=io.github.zznate
quarkus.index-dependency.metadata.artifact-id=vector-store-metadata

# --- Datasource -------------------------------------------------------------

# SQLite is single-writer; size the pool accordingly. The foreign_keys pragma
# arrives through the JDBC URL because Quarkus Agroal does not offer a
# first-class setting for SQLite-specific pragmas.
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:${VECTORSTORE_DB_PATH:./vector-store.db}?foreign_keys=on
quarkus.datasource.jdbc.max-size=1

# Component tests use a per-class unique file under target/ (see
# @QuarkusTestResource usage in vector-store-app/src/test).
%test.quarkus.datasource.jdbc.url=jdbc:sqlite:${VECTORSTORE_DB_PATH:target/test-vector-store.db}?foreign_keys=on
%test.quarkus.datasource.jdbc.max-size=1

# --- Segment storage --------------------------------------------------------
#
# vectorstore.segments.store dispatches which SegmentStore implementation
# gets produced: `s3` wires the phase-3 object-store path against MinIO or
# real S3; `local` falls back to the phase-2 local-filesystem store for
# developers working without docker-compose. `%test-local` selects `local`
# so integration-style tests can run offline.

vectorstore.segments.store=s3
vectorstore.segments.root=${VECTORSTORE_SEGMENTS_ROOT:./segments}

%test.vectorstore.segments.root=${VECTORSTORE_SEGMENTS_ROOT:target/test-segments}

%test-local.vectorstore.segments.store=local
%test-local.vectorstore.segments.root=${VECTORSTORE_SEGMENTS_ROOT:target/test-segments}

# --- Object storage (MinIO / S3) -------------------------------------------

vectorstore.storage.endpoint=${VECTORSTORE_STORAGE_ENDPOINT:http://localhost:9000}
vectorstore.storage.region=${VECTORSTORE_STORAGE_REGION:us-east-1}
vectorstore.storage.bucket=${VECTORSTORE_STORAGE_BUCKET:vectorstore}
vectorstore.storage.access-key=${VECTORSTORE_STORAGE_ACCESS_KEY:minioadmin}
vectorstore.storage.secret-key=${VECTORSTORE_STORAGE_SECRET_KEY:minioadmin}
vectorstore.storage.path-style-access=true

# --- Caches ----------------------------------------------------------------
#
# Every warm-tier cache lives under a unified vectorstore.cache.* tree:
#   block         — object-store block cache (L1 heap + optional L2 off-heap)
#   sidecar       — per-segment metadata sidecar cache
#   manifest      — version-keyed manifest cache
#   segment-handle — bounded handle cache (loaded JVector graph + ordinals)
#
# See io.github.zznate.vectorstore.core.cache.CacheConfig for the full
# property surface and defaults.

vectorstore.cache.block.bytes=67108864
vectorstore.cache.block.block-size=65536
# vectorstore.cache.block.l2.enabled=false
# vectorstore.cache.block.l2.bytes=268435456
# vectorstore.cache.sidecar.bytes=134217728
# vectorstore.cache.manifest.max-entries=64
# vectorstore.cache.manifest.version-ttl-nanos=100000000
# vectorstore.cache.segment-handle.max-entries=256

# --- Flyway -----------------------------------------------------------------

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# --- OpenTelemetry ----------------------------------------------------------
#
# Service identity is a fact about the binary and is pinned here. Exporter
# endpoint and protocol are deployment facts and must be overridable per
# environment; they read from the OpenTelemetry-standard env vars
# (OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_EXPORTER_OTLP_PROTOCOL) with a local
# default so a dev run against a port-forwarded collector "just works".
# Baking a cluster hostname into a %prod-prefixed key was rejected because
# profile-prefixed keys in properties beat plain-keyed system properties,
# making them effectively un-overridable at deploy time.

quarkus.otel.resource.attributes=service.name=vector-store,service.version=${quarkus.application.version}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}

%dev.quarkus.otel.sdk.disabled=true
%test.quarkus.otel.sdk.disabled=true

# --- Logging ----------------------------------------------------------------

quarkus.log.level=INFO
quarkus.log.category."io.github.zznate.vectorstore".level=INFO

# JSON logging in prod, human-readable in dev/test.
%prod.quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
%test.quarkus.log.console.json=false

# --- OpenAPI / metrics exposure --------------------------------------------

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# --- Argon2id password hashing ---------------------------------------------

vectorstore.auth.argon2.iterations=3
vectorstore.auth.argon2.memory-kib=65536
vectorstore.auth.argon2.parallelism=1

# Cheap Argon2 params for tests — tests validate round-trip behaviour, not
# crypto strength.
%test.vectorstore.auth.argon2.iterations=1
%test.vectorstore.auth.argon2.memory-kib=1024
%test.vectorstore.auth.argon2.parallelism=1

# --- Retention sweep -------------------------------------------------------
#
# Soft-deleted bucket / index rows survive the configured retention window
# before the in-process sweep hard-deletes them and cascades object-store
# cleanup. The sweep is gated on `enabled` so a fresh deployment never
# silently drops data; operators must opt in explicitly.
#
# Bucket hard-delete additionally requires every child index (in any
# state) to be hard-deleted first, so the effective bucket lifetime is
# at least max(bucket.window, index.window). Soft-deleted rows are
# invisible to the REST surface throughout the retention window; they
# can be restored via the restore endpoints (task #13).
#
# Defaults below mirror the @WithDefault annotations on
# core/.../retention/RetentionConfig.java — keep the two in sync when
# tuning either.

vectorstore.retention.enabled=false
vectorstore.retention.interval=PT15M
vectorstore.retention.index.window=P7D
vectorstore.retention.bucket.window=P7D

# Tests do not run the sweep on a real timer; ITs invoke runOnce() directly.
%test.vectorstore.retention.enabled=false
