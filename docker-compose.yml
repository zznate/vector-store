# Local-development stack for vector-store. Brings up a single-node MinIO
# and an mc init step that auto-creates the `vectorstore` bucket. The service
# expects to connect at http://localhost:9000 with the root credentials below;
# both are overridable via a sibling .env file.
#
# Usage:
#   docker-compose up -d minio      # bucket is created automatically
#   docker-compose logs -f mc-init  # confirm the bucket was created
#   docker-compose down             # stops MinIO (volume persists)
#   docker-compose down -v          # stops MinIO and drops persisted data

services:
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: vectorstore-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${VECTORSTORE_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${VECTORSTORE_STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  mc-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: vectorstore-mc-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      VECTORSTORE_STORAGE_ACCESS_KEY: ${VECTORSTORE_STORAGE_ACCESS_KEY:-minioadmin}
      VECTORSTORE_STORAGE_SECRET_KEY: ${VECTORSTORE_STORAGE_SECRET_KEY:-minioadmin}
      VECTORSTORE_STORAGE_BUCKET: ${VECTORSTORE_STORAGE_BUCKET:-vectorstore}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$VECTORSTORE_STORAGE_ACCESS_KEY $$VECTORSTORE_STORAGE_SECRET_KEY &&
        mc mb --ignore-existing local/$$VECTORSTORE_STORAGE_BUCKET &&
        echo 'bucket ready: '$$VECTORSTORE_STORAGE_BUCKET
      "
    restart: "no"

volumes:
  minio-data:
